# 三井住友カード プロファイル
# VpassからダウンロードしたCSV用
# https://www.smbc-card.com/mem/

name: 三井住友カード
encoding: shift_jis
skip_rows: 1
skip_footer_rows: 0
delimiter: ","

date_column: 利用日
date_format: "%Y/%m/%d"

amount_column: 利用金額(円)
amount_sign: positive

merchant_column: 利用店名
memo_column: null

columns_to_skip:
  - 支払区分
  - 支払金額(円)
  - 残高(円)
