# 仕訳ルール - キーワードから勘定科目を自動判定
#
# 設定方法:
#   - keywords: 店名・摘要に含まれるキーワードのリスト (いずれか1つでもマッチすれば適用)
#   - category_code: categories.yaml の code と一致する値を指定
#   - match_fields: 照合するフィールド ["merchant_name", "memo"]
#   - priority: 数値が大きいほど優先度高 (デフォルト: 0)
#   - case_sensitive: 大文字小文字を区別するか (デフォルト: false)
#   - comment: 人間向けのコメント
#
# 注意: 複数のルールがマッチした場合、priority の高いものが適用されます。
#       priorityが同じ場合は最初にマッチしたものが適用されます。

rules:
  # ============================================================
  # 通信費 - インターネット・携帯・クラウドサービス
  # ============================================================
  - keywords:
      - NTT
      - docomo
      - ドコモ
      - SoftBank
      - ソフトバンク
      - "au "
      - KDDI
      - UQ mobile
      - IIJmio
      - mineo
      - 楽天モバイル
      - OCN
      - So-net
      - nifty
      - BIGLOBE
      - フレッツ
      - ひかり電話
    category_code: 通信費
    match_fields: [merchant_name, memo]
    priority: 10
    comment: 携帯・インターネット通信会社

  - keywords:
      - さくらインターネット
      - AWS
      - Amazon Web Services
      - Google Cloud
      - GCP
      - Azure
      - Cloudflare
      - Vercel
      - Netlify
      - Heroku
      - DigitalOcean
      - Linode
      - Vultr
      - Xserver
      - エックスサーバー
      - ロリポップ
      - ConoHa
      - お名前.com
      - ムームードメイン
    category_code: 通信費
    match_fields: [merchant_name, memo]
    priority: 10
    comment: クラウドサーバー・ホスティング・ドメイン

  - keywords:
      - Zoom
      - Slack
      - Notion
      - GitHub
      - GitLab
      - Bitbucket
      - ChatGPT
      - OpenAI
      - Anthropic
      - Google Workspace
      - Microsoft 365
      - Office 365
      - Dropbox
      - Box
      - Figma
      - Adobe
      - Canva
      - Linear
      - Jira
      - Confluence
      - Trello
      - Asana
      - Monday
      - HubSpot
      - Salesforce
      - freee
      - マネーフォワード
      - 弥生
    category_code: 通信費
    match_fields: [merchant_name, memo]
    priority: 10
    comment: SaaSビジネスツール（個人事業主は通信費として計上するのが一般的）

  # ============================================================
  # 旅費交通費 - 電車・バス・タクシー・飛行機
